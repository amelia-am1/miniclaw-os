name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install plugin dependencies
        run: |
          for dir in plugins/mc-*/; do
            if [ -f "$dir/vitest.config.ts" ]; then
              echo "Installing deps for $(basename $dir)..."
              (cd "$dir" && npm install --omit=dev --ignore-scripts 2>/dev/null; npm install vitest 2>/dev/null) || true
            fi
          done

      - name: Run tests
        run: npm test
